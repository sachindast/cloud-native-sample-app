apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: sample-node-app
  name: sample-node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-node-app
  strategy: {}
  template:
    metadata:
      labels:
        app: sample-node-app
    spec:
      containers:
      - image: sample-node-app:v1
        imagePullPolicy: Never
        name: sample-node-app
        resources: {}
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: sample-node-config
        - secretRef:
            name: sample-node-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: 
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
status: {}
