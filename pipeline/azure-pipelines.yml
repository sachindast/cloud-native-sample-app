trigger:
  - main

pool:
  name: Default

steps:
  - script: |
      echo "Checking Node.js"
      node -v

      echo "Checking npm"
      npm -v
    displayName: "Validate Node.js Environment"

  - script: |
      cd app

      echo "Installing Dependencies"
      npm install
    displayName: "Install Node.js Dependencies"

  - script: |
      echo "Checking Docker"
      docker --version
    displayName: "Validate Docker Environment"

  - script: |
      echo "Building Docker Image"

      docker build \
        -t sample-node-app:v1 \
        -f Dockerfile .
    displayName: "Build Docker Image"

  - script: |
      docker images
    displayName: "Verify Docker Image"